{% load static %}
<!DOCTYPE html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>ADMIN | LOGIN</title>

    <link rel="shortcut icon" href="{% static 'assets1/images/favicon.ico' %}" />
    <link rel="stylesheet" href="{% static 'assets/css/bootstrap.min.css' %}" />
    <link rel="stylesheet" href="{% static 'assets/fonts/fontawesome/css/all.min.css' %}" />
    <link rel="stylesheet" href="{% static 'assets/css/style.css' %}" />

    <style>
      body {
        font-family: 'Poppins', sans-serif;
        background: linear-gradient(135deg, #e7e3dc, #c89d66);
        margin: 0;
        padding: 0;
      
        display: flex;
        align-items: center;
        justify-content: center;
        height: 100vh;
      }
      
      .login-container {
        width: 100%;
        max-width: 420px;
        background: #fff;
        padding: 40px 45px;
        border-radius: 18px;
        box-shadow: 0 6px 30px rgba(0, 0, 0, 0.15);
        animation: fadeIn 0.7s ease-in-out;
      }
      
      @keyframes fadeIn {
        from {
          opacity: 0;
          transform: translateY(15px);
        }
        to {
          opacity: 1;
          transform: translateY(0);
        }
      }
      
      .login-header {
        text-align: center;
        margin-bottom: 25px;
      }
      
      .login-header h2 {
        font-size: 28px;
        font-weight: 700;
        color: #1d1d1d;
      }
      
      .login-header p {
        color: #666;
        font-size: 14px;
      }
      
      .login-input {
        width: 100%;
        height: 50px;
        padding: 12px 15px;
        font-size: 15px;
        border-radius: 10px;
        border: 1px solid #ddd;
        margin-bottom: 18px;
        transition: 0.3s;
      }
      
      .login-input:focus {
        border-color: #c89d66;
        box-shadow: 0 0 8px rgba(200, 157, 102, 0.4);
        outline: none;
      }
      
      .login-btn {
        width: 100%;
        height: 50px;
        background: #c89d66;
        color: #fff;
        border: none;
        border-radius: 30px;
        font-size: 16px;
        font-weight: 600;
        letter-spacing: 0.5px;
        cursor: pointer;
        transition: 0.3s;
      }
      
      .login-btn:hover {
        background: #a97c4a;
        transform: translateY(-3px);
      }
      
      .footer-note {
        text-align: center;
        margin-top: 15px;
        font-size: 13px;
        color: #555;
      }
    </style>
  </head>

  <body>
    <div class="login-container">
      <div class="login-header">
        <h2><i class="fas fa-user-shield" style="color:#C89D66;"></i> Admin Login</h2>
        <p>Access your secure admin dashboard</p>
      </div>

      <form method="POST" action="{% url 'myadmin' %}">
        {% csrf_token %}

        <input type="text" name="admin_username" class="login-input" placeholder="Username" required />

        <input type="password" name="admin_password" class="login-input" placeholder="Password" required />

        <button type="submit" class="login-btn">Login</button>
      </form>

      <div class="footer-note">© 2025 Lawly | Admin Panel</div>
    </div>

    <script src="{% static 'assets/js/bootstrap.bundle.min.js' %}"></script>
  </body>
</html>
