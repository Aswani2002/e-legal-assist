<!DOCTYPE html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>
      {% block title %}
        Law Chat Bot
      {% endblock %}
    </title>
    <style>
      :root {
        --primary-color: #6366f1;
        /* Indigo 500 */
        --secondary-color: #818cf8;
        /* Indigo 400 */
        --bg-color: #0f172a;
        /* Slate 900 */
        --card-bg: #1e293b;
        /* Slate 800 */
        --text-color: #f1f5f9;
        /* Slate 100 */
        --text-muted: #94a3b8;
        /* Slate 400 */
        --accent-color: #38bdf8;
        /* Sky 400 */
      }
      
      body {
        font-family: 'Inter', -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, Helvetica, Arial, sans-serif;
        background-color: var(--bg-color);
        color: var(--text-color);
        margin: 0;
        padding: 0;
        line-height: 1.6;
      }
      
      /* Navbar */
      nav {
        background-color: rgba(30, 41, 59, 0.8);
        backdrop-filter: blur(10px);
        border-bottom: 1px solid rgba(255, 255, 255, 0.1);
        position: sticky;
        top: 0;
        z-index: 1000;
        padding: 1rem 2rem;
        display: flex;
        justify-content: space-between;
        align-items: center;
      }
      
      .brand {
        font-size: 1.5rem;
        font-weight: 700;
        color: var(--accent-color);
        text-decoration: none;
        display: flex;
        align-items: center;
        gap: 0.5rem;
      }
      
      .nav-links {
        display: flex;
        gap: 2rem;
      }
      
      .nav-links a {
        color: var(--text-muted);
        text-decoration: none;
        font-weight: 500;
        transition: color 0.3s ease;
      }
      
      .nav-links a:hover,
      .nav-links a.active {
        color: var(--primary-color);
      }
      
      /* Container */
      .container {
        max-width: 1200px;
        margin: 2rem auto;
        padding: 0 1rem;
      }
      
      /* Cards */
      .card {
        background-color: var(--card-bg);
        border-radius: 1rem;
        padding: 1.5rem;
        box-shadow: 0 4px 6px -1px rgba(0, 0, 0, 0.1), 0 2px 4px -1px rgba(0, 0, 0, 0.06);
        transition: transform 0.3s ease, box-shadow 0.3s ease;
        border: 1px solid rgba(255, 255, 255, 0.05);
      }
      
      .card:hover {
        transform: translateY(-5px);
        box-shadow: 0 10px 15px -3px rgba(0, 0, 0, 0.1), 0 4px 6px -2px rgba(0, 0, 0, 0.05);
        border-color: var(--secondary-color);
      }
      
      /* Buttons */
      .btn {
        display: inline-block;
        background-color: var(--primary-color);
        color: white;
        padding: 0.75rem 1.5rem;
        border-radius: 0.5rem;
        text-decoration: none;
        font-weight: 600;
        transition: background-color 0.3s ease;
        border: none;
        cursor: pointer;
      }
      
      .btn:hover {
        background-color: var(--secondary-color);
      }
      
      /* Typography */
      h1,
      h2,
      h3 {
        color: var(--text-color);
        margin-top: 0;
      }
      
      input[type='text'] {
        width: 100%;
        padding: 1rem;
        background-color: var(--card-bg);
        border: 1px solid rgba(255, 255, 255, 0.1);
        border-radius: 0.5rem;
        color: var(--text-color);
        font-size: 1rem;
        outline: none;
        transition: border-color 0.3s ease;
      }
      
      input[type='text']:focus {
        border-color: var(--primary-color);
      }
      
      /* Utility */
      .mt-4 {
        margin-top: 1rem;
      }
      
      .mb-4 {
        margin-bottom: 1rem;
      }
      
      .text-center {
        text-align: center;
      }
      
      .grid {
        display: grid;
        grid-template-columns: repeat(auto-fill, minmax(300px, 1fr));
        gap: 2rem;
      }
    </style>
  </head>

  <body>
    <nav>
      <a href="{% url 'chat_view' %}" class="brand">⚖️ LawChat</a>
      <div class="nav-links">
        <a href="{% url 'chat_view' %}" class="{% if request.resolver_match.url_name == 'chat_view' %}active{% endif %}">Chat Bot</a>
        <a href="{% url 'law_list' %}" class="{% if request.resolver_match.url_name == 'law_list' %}active{% endif %}">Browse Laws</a>
      </div>
    </nav>

    <div class="container">
      {% block content %}

      {% endblock %}
    </div>
  </body>
</html>
