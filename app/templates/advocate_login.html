{% load static %}
<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="utf-8" />
    <meta http-equiv="X-UA-Compatible" content="IE=edge" />
    <meta name="viewport" content="width=device-width, initial-scale=1, shrink-to-fit=no" />

    <title>Lawly | Advocate Login</title>
    <link rel="icon" type="image/png" href="{% static 'assets/images/logo/favicon.png' %}" />

    <!-- FONTS + STYLES -->
    <link rel="stylesheet"
        href="https://fonts.googleapis.com/css2?family=Playfair+Display:wght@600;700&family=Poppins:wght@300;400;500;600;700&display=swap" />
    <link rel="stylesheet" href="{% static 'assets/css/bootstrap.min.css' %}" />
    <link rel="stylesheet" href="{% static 'assets/fonts/fontawesome/css/all.min.css' %}" />
    <link rel="stylesheet" href="{% static 'assets/css/style.css' %}" />
    <link rel="stylesheet" href="{% static 'assets/css/responsive.css' %}" />

    <style>
        body {
            font-family: 'Poppins', sans-serif;
            background: linear-gradient(135deg, #e7e3dc, #c89d66);
        }

        .login-container {
            max-width: 450px;
            margin: 90px auto;
            padding: 40px 45px;
            background: #ffffff;
            border-radius: 18px;
            box-shadow: 0 8px 35px rgba(0, 0, 0, 0.09);
            text-align: center;
        }

        /* TITLE */
        .login-container h3 {
            font-family: 'Playfair Display', serif;
            font-size: 32px;
            font-weight: 700;
            margin-bottom: 20px;
            color: #1d1d1d;
        }

        /* INPUT STYLE */
        .login-container input {
            width: 100%;
            height: 50px;
            border: 1px solid #ddd;
            border-radius: 10px;
            padding: 10px 16px;
            margin-bottom: 20px;
            font-size: 15px;
            transition: 0.25s;
        }

        .login-container input:focus {
            border-color: #c89d66;
            box-shadow: 0 0 8px rgba(200, 157, 102, 0.3);
        }

        /* BUTTON */
        .btn-login {
            width: 100%;
            background: #c89d66;
            color: #fff;
            height: 52px;
            border: none;
            border-radius: 12px;
            font-size: 17px;
            font-weight: 600;
            cursor: pointer;
            transition: 0.25s;
        }

        .btn-login:hover {
            background: #a97c4a;
            transform: translateY(-2px);
        }

        .login-container a {
            color: #c89d66;
            font-weight: 600;
            text-decoration: none;
        }

        .login-container a:hover {
            text-decoration: underline;
        }
    </style>
</head>

<body>
    <!-- NAVBAR -->
    <header class="navs">
        <!-- :: Navbar -->
        <nav class="nav-bar nav-bar-2">
            <div class="container">
                <div class="box-content d-flex align-items-center justify-content-between">
                    <div class="logo">
                        <a href="index.html" class="logo-nav">
                            <img class="img-fluid one" src="{% static 'assets/images/logo/01_logo.png' %}"
                                alt="01 Logo" />
                            <img class="img-fluid two" src="{% static 'assets/images/logo/02_logo.png' %}"
                                alt="02 Logo" />
                        </a>
                        <a href="#open-nav-bar-menu" class="open-nav-bar">
                            <span></span>
                            <span></span>
                            <span></span>
                        </a>
                    </div>
                    <div class="nav-bar-link" id="open-nav-bar-menu">
                        <ul class="level-1">
                            <li>
                                <a href="{% url 'home' %}" class="active">Home</a>
                            </li>
                        </ul>
                    </div>
                    <ul>
                        <!-- You can add a link back to User login here if needed -->
                        <li><a class="btn-1" href="{% url 'login' %}">User Login</a></li>
                    </ul>
                </div>
            </div>
        </nav>
    </header>

    <!-- LOGIN BOX -->
    <div class="login-container">
        {% if messages %}
        {% for message in messages %}
        <div class="alert alert-{{ message.tags }} alert-dismissible fade show" role="alert">
            {{ message }}
            <button type="button" class="btn-close" data-bs-dismiss="alert" aria-label="Close"></button>
        </div>
        {% endfor %}
        {% endif %}

        <h3>Advocate Login</h3>

        <form method="POST" action="{% url 'advocate_login' %}">
            {% csrf_token %}
            <input type="email" name="email" placeholder="Advocate Email" required />
            <input type="password" name="password" placeholder="Password" required />

            <button type="submit" class="btn-login">Login as Advocate</button>
        </form>

        <p class="mt-3">
            New Advocate?
            <a href="{% url 'advocate_register' %}">Register here</a>
        </p>
    </div>

    <!-- JS -->
    <script src="{% static 'assets/js/jquery-3.7.1.min.js' %}"></script>
    <script src="{% static 'assets/js/bootstrap.bundle.min.js' %}"></script>
</body>

</html>
